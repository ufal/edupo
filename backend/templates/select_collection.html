  // cache the selects
  var authorSelect = document.getElementById("author");
  var collectionSelect = document.getElementById("collection_style");

  function updateCollections() {
    // get the selected author
    var selectedAuthor = authorSelect.value;
    
    // get the list of collections for that author (or empty)
    var allowed = collectionsByAuthor[selectedAuthor] || [];

    // clear the current options
    while (collectionSelect.firstChild) {
      collectionSelect.removeChild(collectionSelect.firstChild);
    }

    // add a blank option first
    var blank = document.createElement("option");
    blank.value = "";
    blank.textContent = "";
    collectionSelect.appendChild(blank);

    // populate only allowed
    allowed.forEach(function(name) {
      var opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name.replace(/\s*\(.*?\)/g, "");
      collectionSelect.appendChild(opt);
    });
  }

  // attach change watcher
  authorSelect.addEventListener("change", updateCollections);

  // run initially to set correct collections at load
